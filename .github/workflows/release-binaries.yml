name: Release Binaries

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: repo-doctor-linux-amd64
          - os: macos-latest
            name: repo-doctor-macos-amd64
          - os: windows-latest
            name: repo-doctor-windows-amd64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install . pyinstaller

      - name: Build binary
        run: pyinstaller --onefile --name repo-doctor src/repo_doctor/cli.py

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: mv dist/repo-doctor dist/${{ matrix.name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: mv dist/repo-doctor.exe dist/${{ matrix.name }}
        shell: bash

      - name: Upload release asset
        run: gh release upload ${{ github.event.release.tag_name }} dist/${{ matrix.name }} --clobber
        env:
          GH_TOKEN: ${{ github.token }}
